# agh-sync configuration (snake_case)
# Location: ~/.adguardhome-sync.yaml or /etc/agh-sync/config.yaml

origin:
  url: http://127.0.0.1:3000
  username: admin
  password: your-password
  config_path: /opt/AdGuardHome/AdGuardHome.yaml

replicas:
  - url: http://100.88.214.64:3000
    username: admin
    password: your-password

features:
  general_settings: true
  protection_status: true
  query_log_config: true
  stats_config: true
  client_settings: true
  services: true
  dns:
    access_lists: true
    server_config: true
    rewrites: true
  dhcp:
    server_config: false
    static_leases: false
  filters:
    blacklist: true
    whitelist: true
    user_rules: true
  theme: false
  tls_config: false

run_on_start: true
debounce_seconds: 15
